services:
  collabreef-nginx:
    build:
      context: ..
      dockerfile: Dockerfile
      target: nginx-runtime
    image: collabreef/collabreef-nginx:local
    container_name: collabreef-nginx
    ports:
      - "80:80"
    depends_on:
      - collabreef-api
      - collabreef-collab
    restart: unless-stopped

  collabreef-api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-runtime
    image: collabreef/collabreef-api:local
    container_name: collabreef-api
    volumes:
      - ../bin:/usr/local/app/bin
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite3
      - DB_DSN=/usr/local/app/bin/collabreef.db
      - APP_DISABLE_SIGNUP=${APP_DISABLE_SIGNUP}
      - APP_SECRET=${APP_SECRET}
    restart: unless-stopped

  collabreef-collab:
    build:
      context: ..
      dockerfile: Dockerfile
      target: collab-runtime
    image: collabreef/collabreef-collab:local
    container_name: collabreef-collab
    environment:
      - PORT=3000
      - APP_SECRET=${APP_SECRET}
      - GRPC_ADDR=collabreef-api:50051
    depends_on:
      - collabreef-api
    restart: unless-stopped
